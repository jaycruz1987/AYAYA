version: '3.8'

services:
  # The Citylink Node.js Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citylink-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/citylink?schema=public
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_for_local_only}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - citylink-network

  # The PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: citylink-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=citylink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount initialization scripts if any
      - ./database/migrations/V1__init_citylink_schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./database/seeds/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d citylink"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - citylink-network

volumes:
  postgres_data:

networks:
  citylink-network:
    driver: bridge